scanner:
  timeout: 300
  max_retries: 2

logging:
  level: "INFO"
  file: "logs/scanner.log"
  max_bytes: 10485760   # 10 MB
  backup_count: 5

output:
  reports_dir: "reports"
  # Formats written when --format is not supplied on the command line.
  # Any of: json, html, csv, markdown, sarif
  default_formats: ["json", "html"]

history:
  # Persist a lightweight snapshot of each scan so subsequent runs can diff
  # against the previous scan of the same target (newly opened / closed ports).
  enabled: true
  dir: "logs/history"

ci:
  # Severity that makes the process exit non-zero (for pipeline gating).
  # One of: none | low | medium | high | critical
  # Overridden by the --fail-on command-line flag.
  fail_on: "high"

# ─────────────────────────────────────────────────────────────────────────────
# Modular risk database
#
# The port-risk intelligence lives in one or more separate YAML files so it can
# be updated or extended without touching this config. Paths are resolved
# relative to this file's directory. Files are merged in order (later files
# override earlier entries), then any inline 'risk_database' block below is
# merged on top — giving it the final say.
# ─────────────────────────────────────────────────────────────────────────────
risk_database_files:
  - "risk_database.yaml"

# Optional inline overrides / additions. Same schema as risk_database.yaml.
# Example:
#   risk_database:
#     8000:
#       service: "HTTP Dev Server"
#       level: "MEDIUM"
#       description: "Development web server exposed on the network."
#       cvss_score: 5.0
#       remediation: "Bind to localhost; never expose dev servers publicly."
risk_database: {}
